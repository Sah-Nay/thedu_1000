<head>
  <meta lang="pt-BR">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QP-01</title>
  <style>
    @media (max-width: 600px) { h1 { font-size: 1.5em; /* diminui título em telas pequenas */ }
  .resposta { margin-left: 10px; padding-left: 5px; /* ajusta margens e padding para telas pequenas */ }
  textarea { height: 25px; /* diminui altura do textarea em telas pequenas */ }
}

body {
            background-color: #33130044;
            font-family: Arial, sans-serif;
            margin: 0 auto;
            max-width: 1080px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
        }

        a {
            color: #1e724d;
            word-break: break-word;
        }

        ul {
            padding-left: 1.2rem;
        }

        @media (max-width: 900px) {
            body {
                padding: 16px;
            }
        }

        @media (max-width: 620px) {
            body {
                padding: 12px;
            }
            h1 {
                font-size: 1.5rem;
            }
            ul {
                padding-left: 1rem;
            }
        }

h3 {
  white-space: pre-wrap;
}

.pergunta {
  margin-bottom: 20px;
}

.resposta {
  background-color: #5767641b;
  margin-left: 20px;
  border-left: 2px solid hsl(114, 79%, 21%);
  padding-left: 10px;
  margin-top: 5px;
}

textarea {
  background-color: #2877661b;
  width: 100%;
  min-height: 30px;
  height: auto;
  margin-top: 10px;
  overflow: hidden;
  resize: none;
}

button {
  margin-top: 5px;
  padding: 6px 12px;
  background: #33130044;
  color: rgb(0, 0, 0);
  border: none;
  cursor: pointer;
}

button:hover {
  background: #33130083;
}

.btn-excluir {
  margin-left: 10px;
  background: #33130044;
}

.dataHora {
  font-size: 0.9em;
  color: #1b000044;
  margin-left: 10px;
}

#nomeUsuario {
  background-color: #2877661b;
  font-weight: bold;
  color: #000000;
}
  </style>
</head>
<body>
  <h1>QP01- Interpretação de Textos</h1>

  <!-- Campo de nome global -->
  <input type="text" id="nomeUsuario" placeholder="Digite seu nome...">
  <button id="confirmarNome">Confirmar Nome</button>

  <div id="lista-perguntas"></div>

  <button id="exportar">Exportar Respostas</button>
  <button id="limpar">Limpar Respostas</button>

  <!-- Campo para número do WhatsApp -->
  <input type="text" id="numeroWhatsApp" placeholder="Digite seu número do WhatsApp (ex: 5511999999999)">
  <button id="enviarWhatsApp">Enviar Respostas para WhatsApp</button>

  <li>Utilize a imagem a seguir para responder a questão 09:</li>
  <img src="../../imagens/sorvete.png" alt="Conscientização" height="300px" width="300px">

  <script>
  // Variável global para armazenar o nome
let nomeGlobal = "Anônimo";

// Perguntas fixas definidas pelo criador
const perguntasFixas = [ 
     "01- explique com suas palavras o que são generos textuais e de ao menos 3 exemplos.",
     "02- O que é uma linguagem conotativa? e denotativa?",
     "03- diferencie fabula, conto e crônica",
     "04- diferencie noticia e reportagem",
     "05- Leia o texto a seguir e responda: Artigo:\n\n Gripe\n\nA gripe é uma doença respiratória causada pelo vírus influênza, transmitido principalmente por gotículas expelidas ao falar, tossir ou espirrar. Diferente do que muitos acreditam, alimentos frios como sorvete não provocam gripe. O que determina se uma pessoa ficará doente é o contato com o vírus e o estado de seu sistema imunológico.\n\nO sistema imunológico pode ser enfraquecido por diversos fatores, entre eles:\n\nMá alimentação, com excesso de ultraprocessados e falta de frutas, verduras e proteínas.\n\nPrivação de sono, que reduz a capacidade de defesa do organismo.\n\nEstresse crônico, que libera hormônios capazes de prejudicar a resposta imunológica.\n\nSedentarismo ou falta de atividade física regular.\n\nDoenças crônicas como diabetes ou hipertensão, que podem comprometer a imunidade.\n\nPara prevenir a gripe, é essencial manter hábitos saudáveis, praticar exercícios, dormir bem e adotar uma alimentação equilibrada. Além disso, a vacina contra a gripe é a forma mais eficaz de proteção, pois prepara o organismo para reconhecer e combater o vírus.\n\nResponda: A)Qual o gênero textual?",
     "06, B)Qual  objetivo do texto?",
     "08, D)Qual a mensagem/ensinamento?",
     "09- Leia o texto a seguir e responda: \n\nDia de chuva\n\nEra uma vez uma criança chamada Lucas, que adorava brincar na chuva sem agasalho. Certo dia, depois de correr muito sob o frio, sua garganta ficou inflamada e ele passou a ter dor ao engolir.\n\nPara ajudar a dor, sua mãe lhe trouxe sorvete após um xarope hirrível!\n\nLucas aprendeu a lição, de que brincar na chuva pode ser muito doloroso. \n\nMoral da história: Nem tudo que é divertido é saudável. Às vezes, é preciso pensar nas consequências antes de agir. \n\nResponda: A)Qual o gênero textual?",
     "07, B)Qual  objetivo do texto?",
     "08, D)Qual a mensagem/ensinamento?",
     "09- Veja a imagem no fim da página e responda o que se pede: \n\n A)Qual o gênero textual?",
     "10, B) Qual a mensagem/ensinamento da imagem?",
     "11, C) Qual o objetivo da imagem?",
     "12, D) A informação é verdadeira ou trata-se de uma fake news? Justifique sua resposta."
  ];

// Carregar respostas salvas
window.onload = function() {
  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  perguntasFixas.forEach(p => mostrarPergunta(p, dados[p] || []));

  document.getElementById("exportar").addEventListener("click", exportRespostas);
  document.getElementById("limpar").addEventListener("click", limparRespostas);
  document.getElementById("confirmarNome").addEventListener("click", confirmarNome);
  document.getElementById("enviarWhatsApp").addEventListener("click", enviarParaWhatsApp);
};

function confirmarNome() {
  const nome = document.getElementById("nomeUsuario").value.trim();
  if (nome !== "") {
    nomeGlobal = nome;
    alert("Nome confirmado: " + nomeGlobal);
  } else {
    alert("Você não digitou um nome, será usado 'Anônimo'.");
  }
}

function mostrarPergunta(texto, respostas) {
  const lista = document.getElementById("lista-perguntas");

  const divPergunta = document.createElement("div");
  divPergunta.classList.add("pergunta");

  const titulo = document.createElement("h3");
  titulo.textContent = texto;
  divPergunta.appendChild(titulo);

  // Caixa de resposta
  const campoResposta = document.createElement("textarea");
  campoResposta.placeholder = "Digite sua resposta...";
  campoResposta.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
  });
  campoResposta.addEventListener('focus', function() {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
  });
  divPergunta.appendChild(campoResposta);

  // Bot�o de resposta
  const botaoResposta = document.createElement("button");
  botaoResposta.textContent = "Responder";

  // Div para respostas (abaixo da caixa e bot�o)
  const divRespostas = document.createElement("div");

  botaoResposta.onclick = function() {
    const textoResposta = campoResposta.value.trim();
    if (textoResposta !== "") {
      const dataHora = new Date().toLocaleString("pt-BR");
      const respostaFormatada = `<strong>${nomeGlobal}</strong> respondeu: ${textoResposta} <span class="dataHora">(${dataHora})</span>`;
      const idx = salvarResposta(texto, respostaFormatada);

      const resp = criarResposta(respostaFormatada, texto, idx);
      divRespostas.appendChild(resp);
      campoResposta.value = "";
    }
  };
  divPergunta.appendChild(botaoResposta);

  // Agora adiciona as respostas abaixo da caixa e bot�o
  respostas.forEach((r, i) => {
    const resp = criarResposta(r, texto, i);
    divRespostas.appendChild(resp);
  });
  divPergunta.appendChild(divRespostas);

  lista.appendChild(divPergunta);
}

function criarResposta(textoResposta, pergunta, index) {
  const resp = document.createElement("div");
  resp.classList.add("resposta");

  const span = document.createElement("span");
  span.innerHTML = textoResposta; // usa innerHTML para renderizar <strong> e data/hora
  resp.appendChild(span);

  const del = document.createElement("button");
  del.classList.add("btn-excluir");
  del.textContent = "?";
  del.title = "Excluir resposta";
  del.onclick = function() { excluirResposta(pergunta, index, resp); };
  resp.appendChild(del);

  return resp;
}

function salvarResposta(pergunta, resposta) {
  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  if (!dados[pergunta]) {
    dados[pergunta] = [];
  }
  dados[pergunta].push(resposta);
  localStorage.setItem("respostas", JSON.stringify(dados));
  return dados[pergunta].length - 1;
}

function excluirResposta(pergunta, index, elementoDOM) {
  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  if (!dados[pergunta]) return;
  dados[pergunta].splice(index, 1);
  localStorage.setItem("respostas", JSON.stringify(dados));
  elementoDOM.remove(); // remove do DOM sem reload
}

function limparRespostas() {
  if (!confirm("Tem certeza que deseja apagar todas as respostas?")) return;
  localStorage.removeItem("respostas");
  document.getElementById("lista-perguntas").innerHTML = "";
  perguntasFixas.forEach(p => mostrarPergunta(p, []));
}

function enviarParaWhatsApp() {
  const numero = document.getElementById("numeroWhatsApp").value.trim();
  if (!numero) {
    alert("Por favor, digite seu n�mero do WhatsApp.");
    return;
  }

  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  let mensagem = `Respostas de ${nomeGlobal}:\n\n`;

  perguntasFixas.forEach(pergunta => {
    if (dados[pergunta] && dados[pergunta].length > 0) {
      mensagem += `${pergunta}\n`;
      dados[pergunta].forEach(resposta => {
        // Remover tags HTML para texto plano
        const respostaTexto = resposta.replace(/<[^>]*>/g, '');
        mensagem += `- ${respostaTexto}\n`;
      });
      mensagem += '\n';
    }
  });

  if (mensagem === `Respostas de ${nomeGlobal}:\n\n`) {
    alert("Não há respostas para enviar.");
    return;
  }

  const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
  window.open(url, '_blank');
}

function exportRespostas() {
  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  const blob = new Blob([JSON.stringify(dados, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "respostas.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
