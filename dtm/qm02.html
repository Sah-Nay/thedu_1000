<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QM02</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #974c216e;
    margin: 0 auto;
    max-width: 900px;
    padding: 20px;
}

h1 {
    text-align: center;
}

.pergunta {
    margin-bottom: 10px;
}

.resposta {
    background-color: rgb(165, 145, 132);
    font-family: Arial, sans-serif;
    width: 100%;
    min-height: 40px;
    padding: 5px;
    resize: none;
}

button {
    background-color: #3816036e;
    margin-top: 10px;
    padding: 8px 14px;
    cursor: pointer;
}

:active button {
    background-color: #30250388;
}

#resultadoFinal {
    margin-top: 30px;
    padding: 15px;
    border-top: 2px solid black;
}

.correto {
    color: green;
}

.errado {
    color: red;
}
</style>
</head>

<body>

<h1>QM02- Razão e Proporção</h1>

<div id="questionario"></div>

<button onclick="mostrarRespostas()">Corrigir</button>

<div id="resultadoFinal"></div>

<script>

let nomeGlobal = "Thedu";

// Perguntas fixas definidas pelo criador
const perguntasFixas = [
      "01: O que é razão, e para que serve?",
      "02: O que é proporção?",
      "03: por que a fração 1/3 é equivalente a fração 5/15",
      "04: O que seria uma grandeza proporcional?",
      "05: Quais são os tipos de grandezas?",
      "06: O que seria uma grandeza diretamente proporcional?",
      "07: O que seria uma grandeza inversamente proporcional?",
      "08: Responda as seguintes frações sabendo-se que: a) Numerador 14, denoomindor 8",
      "08: b) denominador 84, numerador 12",
      "08: c) denominador 2, numerador 422",
      "09: resolva as seguintes questões sabendo-se que podem ser direta ou inversamente proporcional: a) Um carro percorre 120 km em 2 horas. Mantendo a mesma velocidade, quantos quilômetros ele percorrerá em 5 horas?",
      "09: b) Se 6 operários constroem um muro em 12 dias, em quantos dias 4 operários, trabalhando no mesmo ritmo, construirão o mesmo muro?",
      "09: c) Uma fábrica produz 240 peças em 8 horas de trabalho com 12 máquinas funcionando simultaneamente. Se todas as máquinas mantiverem o mesmo ritmo, quantas peças serão produzidas em 10 horas com 15 máquinas?",
      "09: d) Uma escola planeja uma excursão e contratou um ônibus para levar 40 alunos. No entanto, houve um aumento no número de participantes para 50 alunos. Para que todos possam ir, a empresa decidiu aumentar o número de ônibus, mantendo a mesma lotação por veículo. Quantos ônibus serão necessários?",
      "09: e) Um pintor usa 2 litros de tinta para pintar 40 m² de parede. Quantos litros serão necessários para pintar 100 m²?",
      "09: f) Uma torneira enche um tanque em 12 horas. Se forem abertas 3 torneiras iguais, em quanto tempo o tanque ficará cheio?",
      "09: g) Uma gráfica imprime 500 livros em 10 dias utilizando 5 impressoras. Mantendo o mesmo ritmo de trabalho, em quantos dias 8 impressoras imprimirão 1.200 livros?",
      "09: h) Um grupo de estudantes planejou traduzir um livro em 30 dias com 6 tradutores. No entanto, apenas 10 tradutores se disponibilizaram para o trabalho. Mantendo o mesmo ritmo, em quantos dias o livro será traduzido?"
];

// RESPOSTAS CORRETAS
const respostasFixas = [
"Razão é o resultado da fração e serve para encontrar a relção entre duas grandezas",
"Proporção é o que a razão de duas grandezas tem de semelhante.",
"Pois 1/15*(1/3)=1/5*(5/15)",
"Seria uma grandeza cuja a mudança de um altera também a outra",
"Direta e inversamente proporcional",
"Seria a grandeza que se aumenta ou diminui na mesma proporcao",
"Seria a grandeza que se aumenta ou diminui inversamente",
"7/4",
"7",
"1/211",
"300 km",
"18 dias",  
"375 peças",
"2 ônibus",
"5 litros",
"4 horas",
"15 dias",
"18 dias"
];

// CRIAR PERGUNTAS
window.onload = function() {
    const container = document.getElementById("questionario");

    perguntasFixas.forEach((pergunta, index) => {
        const div = document.createElement("div");
        div.classList.add("pergunta");

        const respostaSalva = localStorage.getItem(`resp${index}`) || "";

        div.innerHTML = `
            <label>${pergunta}</label>
            <textarea id="resp${index}" class="resposta">${respostaSalva}</textarea>
        `;

        container.appendChild(div);

        const textarea = document.getElementById(`resp${index}`);

        setTimeout(() => {
            textarea.style.height = textarea.scrollHeight + "px";
        }, 0);

        textarea.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = this.scrollHeight + "px";
            localStorage.setItem(`resp${index}`, this.value);
        });
    });
};

// MOSTRAR RESULTADO
function mostrarRespostas() {
    const resultadoDiv = document.getElementById("resultadoFinal");

    resultadoDiv.innerHTML = `<h2>Resultado de ${nomeGlobal}</h2>`;

    let acertos = 0;

    perguntasFixas.forEach((pergunta, index) => {
        const input = document.getElementById(`resp${index}`);
        const respostaUsuario = input ? input.value.trim() : "";

        const respostaCorreta = respostasFixas[index] || "";

        const acertou = respostaUsuario.toLowerCase() === respostaCorreta.toLowerCase();

        if (acertou) acertos++;

        const div = document.createElement("div");

        div.innerHTML = `
            <strong>${pergunta}</strong><br>
            🧑 Sua resposta: ${respostaUsuario || "(vazia)"}<br>
            ✅ Correta: ${respostaCorreta}<br>
            <span class="${acertou ? 'correto' : 'errado'}">
                ${acertou ? "✔ Acertou" : "✘ Errou"}
            </span>
            <hr>
        `;

        resultadoDiv.appendChild(div);
    });

    const nota = document.createElement("h3");
    nota.innerText = `Pontuação: ${acertos} / ${perguntasFixas.length}`;

    resultadoDiv.appendChild(nota);
}

</script>

</body>
</html>
