<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Questionário de Porcentagem</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #974c216e;
    margin: 0 auto;
    max-width: 900px;
    padding: 20px;
}

h1 {
    text-align: center;
}

.pergunta {
    margin-bottom: 10px;
}

.resposta {
    background-color: rgb(165, 145, 132);
    font-family: Arial, sans-serif;
    width: 100%;
    min-height: 40px;
    padding: 5px;
    resize: none;
}

button {
    background-color: #3816036e;
    margin-top: 10px;
    padding: 8px 14px;
    cursor: pointer;
}

:active button {
    background-color: #30250388;
}

#resultadoFinal {
    margin-top: 30px;
    padding: 15px;
    border-top: 2px solid black;
}

.correto {
    color: green;
}

.errado {
    color: red;
}
</style>
</head>

<body>

<h1>Questionário de Porcentagem</h1>

<div id="questionario"></div>

<button onclick="mostrarRespostas()">Corrigir</button>

<div id="resultadoFinal"></div>

<script>

"11: d) X=13 Y=100",

"11: f) X=12 Y=76",

];

// RESPOSTAS CORRETAS
const respostasFixas = [
"Usamos porcentagem em compras, descontos, juros, estatísticas",
"Porcentagem é uma fração de 100",
"Percentual, fração e decimal",
"Ex: 50%, 1/2, 0,5",

// CRIAR PERGUNTAS
window.onload = function() {
    const container = document.getElementById("questionario");

    perguntasFixas.forEach((pergunta, index) => {
        const div = document.createElement("div");
        div.classList.add("pergunta");

        const respostaSalva = localStorage.getItem(`resp${index}`) || "";

        div.innerHTML = `
            <label>${pergunta}</label>
            <textarea id="resp${index}" class="resposta">${respostaSalva}</textarea>
        `;

        container.appendChild(div);

        const textarea = document.getElementById(`resp${index}`);

        setTimeout(() => {
            textarea.style.height = textarea.scrollHeight + "px";
        }, 0);

        textarea.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = this.scrollHeight + "px";
            localStorage.setItem(`resp${index}`, this.value);
        });
    });
};

// MOSTRAR RESULTADO
function mostrarRespostas() {
    const resultadoDiv = document.getElementById("resultadoFinal");

    resultadoDiv.innerHTML = `<h2>Resultado de ${nomeGlobal}</h2>`;

    let acertos = 0;

    perguntasFixas.forEach((pergunta, index) => {
        const input = document.getElementById(`resp${index}`);
        const respostaUsuario = input ? input.value.trim() : "";

        const respostaCorreta = respostasFixas[index] || "";

        const acertou = respostaUsuario.toLowerCase() === respostaCorreta.toLowerCase();

        if (acertou) acertos++;

        const div = document.createElement("div");

        div.innerHTML = `
            <strong>${pergunta}</strong><br>
            🧑 Sua resposta: ${respostaUsuario || "(vazia)"}<br>
            ✅ Correta: ${respostaCorreta}<br>
            <span class="${acertou ? 'correto' : 'errado'}">
                ${acertou ? "✔ Acertou" : "✘ Errou"}
            </span>
            <hr>
        `;

        resultadoDiv.appendChild(div);
    });

    const nota = document.createElement("h3");
    nota.innerText = `Pontuação: ${acertos} / ${perguntasFixas.length}`;

    resultadoDiv.appendChild(nota);
}

</script>

</body>
</html>
