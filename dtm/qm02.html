<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QM02</title>
  <style>
    @media (max-width: 600px) { h1 { font-size: 1.5em; /* diminui título em telas pequenas */ }
  .resposta { margin-left: 10px; padding-left: 5px; /* ajusta margens e padding para telas pequenas */ }
  textarea { height: 25px; /* diminui altura do textarea em telas pequenas */ }
}

body {
            background-color: #33130044;
            font-family: Arial, sans-serif;
            margin: 0 auto;
            max-width: 1080px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
        }

        a {
            color: #1e724d;
            word-break: break-word;
        }

        ul {
            padding-left: 1.2rem;
        }

        @media (max-width: 900px) {
            body {
                padding: 16px;
            }
        }

        @media (max-width: 620px) {
            body {
                padding: 12px;
            }
            h1 {
                font-size: 1.5rem;
            }
            ul {
                padding-left: 1rem;
            }
        }

.pergunta {
  margin-bottom: 20px;
}

.resposta {
  background-color: #5767641b;
  margin-left: 20px;
  border-left: 2px solid hsl(114, 79%, 21%);
  padding-left: 10px;
  margin-top: 5px;  white-space: pre-wrap;
  word-wrap: break-word;
}

textarea {
  background-color: #2877661b;
  width: 100%;
  height: 30px;
  margin-top: 10px;
}

button {
  margin-top: 5px;
  padding: 6px 12px;
  background: #33130044;
  color: rgb(0, 0, 0);
  border: none;
  cursor: pointer;
}

button:hover {
  background: #33130083;
}

.btn-excluir {
  margin-left: 10px;
  background: #33130044;
}

.dataHora {
  font-size: 0.9em;
  color: #1b000044;
  margin-left: 10px;
}

#nomeUsuario {
  background-color: #2877661b;
  font-weight: bold;
  color: #000000;
}
  </style>
</head>
<body>
  <h1>QM02 - Razão e Proporção</h1>

  <!-- Campo de nome global -->
  <input type="text" id="nomeUsuario" placeholder="Digite seu nome...">
  <button id="confirmarNome">Confirmar Nome</button>

  <div id="lista-perguntas"></div>

  <button id="exportar">Exportar Respostas</button>
  <button id="limpar">Limpar Respostas</button>

  <!-- Campo para número do WhatsApp -->
  <input type="text" id="numeroWhatsApp" placeholder="Digite seu número do WhatsApp (ex: 5511999999999)">
  <button id="enviarWhatsApp">Enviar Respostas para WhatsApp</button>
  
  <script>
  // Variável global para armazenar o nome
let nomeGlobal = "Anônimo";

// Perguntas fixas definidas pelo criador
const perguntasFixas = [
      "01: O que é razão, e para que serve?",
      "02: O que é proporção?",
      "03: por que a fração 1/3 é equivalente a fração 5/15",
      "04: O que seria uma grandeza proporcional?",
      "05: Quais são os tipos de grandezas?",
      "06: O que seria uma grandeza diretamente proporcional?",
      "07: O que seria uma grandeza inversamente proporcional?",
      "08: Responda as seguintes frações sabendo-se que: a) Numerador 14, denoomindor 8",
      "08: b) denominador 84, numerador 12",
      "08: c) denominador 2, numerador 422",
      "09: resolva as seguintes questões sabendo-se que podem ser direta ou inversamente proporcional: a) Um carro percorre 120 km em 2 horas. Mantendo a mesma velocidade, quantos quilômetros ele percorrerá em 5 horas?",
      "09: b) Se 6 operários constroem um muro em 12 dias, em quantos dias 4 operários, trabalhando no mesmo ritmo, construirão o mesmo muro?",
      "09: c) Uma fábrica produz 240 peças em 8 horas de trabalho com 12 máquinas funcionando simultaneamente. Se todas as máquinas mantiverem o mesmo ritmo, quantas peças serão produzidas em 10 horas com 15 máquinas?",
      "09: d) Uma escola planeja uma excursão e contratou um ônibus para levar 40 alunos. No entanto, houve um aumento no número de participantes para 50 alunos. Para que todos possam ir, a empresa decidiu aumentar o número de ônibus, mantendo a mesma lotação por veículo. Quantos ônibus serão necessários?",
      "09: e) Um pintor usa 2 litros de tinta para pintar 40 m² de parede. Quantos litros serão necessários para pintar 100 m²?",
      "09: f) Uma torneira enche um tanque em 12 horas. Se forem abertas 3 torneiras iguais, em quanto tempo o tanque ficará cheio?",
      "09: g) Uma gráfica imprime 500 livros em 10 dias utilizando 5 impressoras. Mantendo o mesmo ritmo de trabalho, em quantos dias 8 impressoras imprimirão 1.200 livros?",
      "09: h) Um grupo de estudantes planejou traduzir um livro em 30 dias com 6 tradutores. No entanto, apenas 10 tradutores se disponibilizaram para o trabalho. Mantendo o mesmo ritmo, em quantos dias o livro será traduzido?"
];

// Carregar respostas salvas
window.onload = function() {
  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  perguntasFixas.forEach(p => mostrarPergunta(p, dados[p] || []));

  document.getElementById("exportar").addEventListener("click", exportRespostas);
  document.getElementById("limpar").addEventListener("click", limparRespostas);
  document.getElementById("confirmarNome").addEventListener("click", confirmarNome);
  document.getElementById("enviarWhatsApp").addEventListener("click", enviarParaWhatsApp);
};

function confirmarNome() {
  const nome = document.getElementById("nomeUsuario").value.trim();
  if (nome !== "") {
    nomeGlobal = nome;
    alert("Nome confirmado: " + nomeGlobal);
  } else {
    alert("Você não digitou um nome, será usado 'Anônimo'.");
  }
}

function mostrarPergunta(texto, respostas) {
  const lista = document.getElementById("lista-perguntas");

  const divPergunta = document.createElement("div");
  divPergunta.classList.add("pergunta");

  const titulo = document.createElement("h3");
  titulo.textContent = texto;
  divPergunta.appendChild(titulo);

  // Caixa de resposta
  const campoResposta = document.createElement("textarea");
  campoResposta.placeholder = "Digite sua resposta...";
  divPergunta.appendChild(campoResposta);

  // Botão de resposta
  const botaoResposta = document.createElement("button");
  botaoResposta.textContent = "Responder";

  // Div para respostas (abaixo da caixa e botão)
  const divRespostas = document.createElement("div");

  botaoResposta.onclick = function() {
    const textoResposta = campoResposta.value.trim();
    if (textoResposta !== "") {
      const dataHora = new Date().toLocaleString("pt-BR");
      const respostaFormatada = `<strong>${nomeGlobal}</strong> respondeu: ${textoResposta} <span class="dataHora">(${dataHora})</span>`;
      const idx = salvarResposta(texto, respostaFormatada);

      const resp = criarResposta(respostaFormatada, texto, idx);
      divRespostas.appendChild(resp);
      campoResposta.value = "";
    }
  };
  divPergunta.appendChild(botaoResposta);

  // Agora adiciona as respostas abaixo da caixa e botão
  respostas.forEach((r, i) => {
    const resp = criarResposta(r, texto, i);
    divRespostas.appendChild(resp);
  });
  divPergunta.appendChild(divRespostas);

  lista.appendChild(divPergunta);
}

function criarResposta(textoResposta, pergunta, index) {
  const resp = document.createElement("div");
  resp.classList.add("resposta");

  const span = document.createElement("span");
  span.innerHTML = textoResposta; // usa innerHTML para renderizar <strong> e data/hora
  resp.appendChild(span);

  const del = document.createElement("button");
  del.classList.add("btn-excluir");
  del.textContent = "✖";
  del.title = "Excluir resposta";
  del.onclick = function() { excluirResposta(pergunta, index, resp); };
  resp.appendChild(del);

  return resp;
}

function salvarResposta(pergunta, resposta) {
  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  if (!dados[pergunta]) {
    dados[pergunta] = [];
  }
  dados[pergunta].push(resposta);
  localStorage.setItem("respostas", JSON.stringify(dados));
  return dados[pergunta].length - 1;
}

function excluirResposta(pergunta, index, elementoDOM) {
  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  if (!dados[pergunta]) return;
  dados[pergunta].splice(index, 1);
  localStorage.setItem("respostas", JSON.stringify(dados));
  elementoDOM.remove(); // remove do DOM sem reload
}

function limparRespostas() {
  if (!confirm("Tem certeza que deseja apagar todas as respostas?")) return;
  localStorage.removeItem("respostas");
  document.getElementById("lista-perguntas").innerHTML = "";
  perguntasFixas.forEach(p => mostrarPergunta(p, []));
}

function enviarParaWhatsApp() {
  const numero = document.getElementById("numeroWhatsApp").value.trim();
  if (!numero) {
    alert("Por favor, digite seu número do WhatsApp.");
    return;
  }

  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  let mensagem = `Respostas de ${nomeGlobal}:\n\n`;

  perguntasFixas.forEach(pergunta => {
    if (dados[pergunta] && dados[pergunta].length > 0) {
      mensagem += `${pergunta}\n`;
      dados[pergunta].forEach(resposta => {
        // Remover tags HTML para texto plano
        const respostaTexto = resposta.replace(/<[^>]*>/g, '');
        mensagem += `- ${respostaTexto}\n`;
      });
      mensagem += '\n';
    }
  });

  if (mensagem === `Respostas de ${nomeGlobal}:\n\n`) {
    alert("Não há respostas para enviar.");
    return;
  }

  const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
  window.open(url, '_blank');
}

function exportRespostas() {
  const dados = JSON.parse(localStorage.getItem("respostas")) || {};
  const blob = new Blob([JSON.stringify(dados, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "respostas.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
