<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>QM01</title>
  <link rel="stylesheet" href="style.css"> <!-- CSS separado -->
</head>
<body>
  <h1>QM01 - Porcentagem</h1>

  <!-- Campo de nome global -->
  <input type="text" id="nomeUsuario" placeholder="Digite seu nome...">
  <button id="confirmarNome">Confirmar Nome</button>

  <div id="lista-perguntas"></div>

  <button id="exportar">Exportar Respostas</button>
  <button id="limpar">Limpar Respostas</button>

  <!-- Campo para número do WhatsApp -->
  <input type="text" id="numeroWhatsApp" placeholder="Digite seu número do WhatsApp (ex: 5511999999999)">
  <button id="enviarWhatsApp">Enviar Respostas para WhatsApp</button>

  <script src="script.js"></script> <!-- JavaScript separado -->
</body>
</html>
